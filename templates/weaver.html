<!--
  完整的 Dream Weaver Room 範本（weaver.html）
  - 包含：進入動畫遮罩、兩個主要輸入欄位（夢境與現實）、切換 Checkbox 與送出按鈕
  - 所有 UI 文案均使用繁體中文
  - 註解為逐行說明，方便學習動畫與互動邏輯
-->
<!doctype html>
<html lang="zh-Hant">
  <head>
    <!-- 設定文件編碼與響應式 viewport -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- 頁面標題（繁體中文） -->
    <title>夢境編織室</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styleWeaver.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  </head>
  <body>
    <!-- ============ 星點背景層（新增：星空感）============ -->
    <!-- 由 JS 動態生成 55 個隨機位置與大小的星點，產生閃爍星空效果 -->
    <div id="star-layer" aria-hidden="true"></div>

    <!-- 背景環境光球：放在最底層，作為 Aurora 效果 -->
    <div class="ambient-orb one"></div>
    <div class="ambient-orb two"></div>
    <div class="ambient-orb three"></div>
    <!-- ⑤ 成功置入：六芒星水印 -->
    <svg style="position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:500px;height:500px;opacity:.025;pointer-events:none;z-index:0;animation:sigilRot 60s linear infinite;" viewBox="0 0 200 200">
      <polygon points="100,10 190,155 10,155" fill="none" stroke="rgba(155,120,255,1)" stroke-width="1"/>
      <polygon points="100,190 10,45 190,45" fill="none" stroke="rgba(155,120,255,1)" stroke-width="1"/>
      <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(123,220,255,.8)" stroke-width=".8"/>
      <circle cx="100" cy="100" r="52" fill="none" stroke="rgba(155,120,255,.6)" stroke-width=".6" stroke-dasharray="4 3"/>
    </svg>
    <!-- 原本的星座連線 SVG -->
    <svg style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.38;" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
    <line x1="80" y1="120" x2="280" y2="200" stroke="rgba(200,170,255,.9)" stroke-width="1"/>
    <line x1="280" y1="200" x2="440" y2="150" stroke="rgba(200,170,255,.9)" stroke-width="1"/>
    <line x1="440" y1="150" x2="560" y2="280" stroke="rgba(160,220,255,.85)" stroke-width="1"/>
    <line x1="900" y1="100" x2="1060" y2="180" stroke="rgba(200,170,255,.85)" stroke-width="1"/>
    <line x1="1060" y1="180" x2="1250" y2="130" stroke="rgba(200,170,255,.85)" stroke-width="1"/>
    <line x1="1060" y1="180" x2="1150" y2="320" stroke="rgba(160,220,255,.8)" stroke-width="1"/>
    <line x1="100" y1="650" x2="200" y2="780" stroke="rgba(200,170,255,.75)" stroke-width="1"/>
    <line x1="1200" y1="700" x2="1350" y2="800" stroke="rgba(160,220,255,.75)" stroke-width="1"/>

    <circle cx="80" cy="120" r="3" fill="rgba(220,190,255,1)"/>
    <circle cx="280" cy="200" r="2.5" fill="rgba(220,190,255,.95)"/>
    <circle cx="440" cy="150" r="2.8" fill="rgba(160,230,255,1)"/>
    <circle cx="560" cy="280" r="2.2" fill="rgba(160,230,255,.9)"/>
    <circle cx="900" cy="100" r="3" fill="rgba(255,180,230,.95)"/>
    <circle cx="1060" cy="180" r="3.2" fill="rgba(220,190,255,1)"/>
    <circle cx="1250" cy="130" r="2.5" fill="rgba(220,190,255,.9)"/>
    <circle cx="1150" cy="320" r="2.2" fill="rgba(160,230,255,.9)"/>
    <circle cx="100" cy="650" r="2.5" fill="rgba(220,190,255,.85)"/>
    <circle cx="200" cy="780" r="2.2" fill="rgba(220,190,255,.8)"/>
    <circle cx="1200" cy="700" r="2.5" fill="rgba(160,230,255,.85)"/>
    <circle cx="1350" cy="800" r="2.2" fill="rgba(160,230,255,.8)"/>
  </svg>
    <!-- 背景粒子畫布：用來呈現滑鼠流動的星光與細緻粒子軌跡 -->
    <canvas id="particle-canvas" aria-hidden="true"></canvas>
    <!-- 自訂月亮游標：跟隨滑鼠，營造夢境感 -->
    <div id="cursor-moon" aria-hidden="true">
      <svg
        viewBox="0 0 64 64"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-label="moon cursor"
      >
        <path
          d="M40 10c-12 0-21 9-21 21s9 21 21 21c7 0 13-3 17-8-8 7-19 10-30 7C18 47 9 36 9 24 9 12 18 2 30 2c5 0 10 1 14 4-4-1-8-2-4-2z"
          fill="rgba(255,255,255,0.95)"
        />
      </svg>
    </div>

    <!-- ============ 左上 Home 圖示（新版：加框 + 引用旋轉 hover 的同類框架） ============ -->
    <!-- 使用 nav-icon-frame + home-frame，框樣式與右上設定圖示完全一致 -->
    <!-- hover 效果：縮放放大（見 .nav-icon-frame.home-frame:hover） -->
    <a href="/" title="回到大廳" class="nav-icon-frame home-frame nav-top-left">
      <img
        src="{{ url_for('static', filename='images/home_icon.png') }}"
        alt="回大廳"
        class="home-png-icon-inner"
      />
      <div class="tt">回到大廳</div>
    </a>

    <!-- 設定圖示按鈕：右上角自訂 PNG 圖標，點擊開啟設定面板 -->
    <!-- ============ 右上 Settings 圖示（保留原旋轉動畫，框樣式更新為 nav-icon-frame）============ -->
    <!-- hover 效果：rotate(20deg) 旋轉（見 .nav-icon-frame.settings-frame:hover） -->
    <a
      href="#"
      id="settings-toggle"
      title="編織室設定"
      class="nav-icon-frame settings-frame nav-top-right"
    >
      <img
        src="{{ url_for('static', filename='images/my_settings.png') }}"
        alt="設定"
        class="settings-png-icon"
      />
      <div class="tt">編織室設定</div>
    </a>

    <!-- 設定面板模態：玻璃擬態設計，包含音樂與語音開關 -->
    <div id="settings-modal">
      <div class="settings-panel">
        <h2>設定</h2>
        <button
          class="close-btn"
          id="close-settings-btn"
          type="button"
          title="關閉"
        >
          ✕
        </button>

        <!-- 背景音樂開關：開啟/關閉潛意識環境音 -->
        <div class="settings-option">
          <div class="toggle-switch">
            <input type="checkbox" id="toggle-music" title="切換背景環境音" checked />
            <div class="switch-slider"></div>
          </div>
          <label for="toggle-music">開啟潛意識環境音</label>
        </div>

        <!-- 語音輸入開關：開啟/關閉語音夢境捕捉 -->
        <div class="settings-option">
          <div class="toggle-switch">
            <input type="checkbox" id="toggle-voice" title="切換語音輸入" />
            <div class="switch-slider"></div>
          </div>
          <label for="toggle-voice">啟用語音夢境捕捉</label>
        </div>
      </div>
    </div>

    <!-- 隱藏的背景音訊元素：由設定中的音樂開關控制播放 -->
    <audio id="bg-music" loop>
      <source
        src="{{ url_for('static', filename='audio/dream_lofi.mp3') }}"
        type="audio/mpeg"
      />
      你的瀏覽器不支援音訊播放。
    </audio>

    <!-- 進入動畫遮罩：載入頁面時顯示，使用者點 anywhere 後淡出 -->

      <!-- 進入動畫顯示的大字：要求使用者點擊以開始 -->
      <div class="intro-text">你醒啦，開始紀錄夢境吧！</div>
    </div>

    <!-- 主容器：置中顯示卡片與輸入欄位 -->
    <div class="container">
      <div class="card" role="main">
        <!-- 標題上方的旋轉 eyebrow -->
<div style="text-align:center;margin-bottom:14px;">
  <div style="display:inline-flex;align-items:center;gap:8px;padding:5px 16px;border-radius:999px;background:rgba(123,220,255,.07);border:1px solid rgba(123,220,255,.15);">
    <div style="width:5px;height:5px;border-radius:50%;background:rgba(123,220,255,.9);animation:tdot 2s ease-in-out infinite;"></div>
    <div style="overflow:hidden;width:240px;height:15px;position:relative;">
      <div id="ticker-inner" style="display:flex;flex-direction:column;animation:tickerScroll 12s ease-in-out infinite;">
        <div style="height:15px;line-height:15px;font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(123,220,255,.8);">Subconscious Observation</div>
        <div style="height:15px;line-height:15px;font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(123,220,255,.8);">Dream · Decode · Discover</div>
        <div style="height:15px;line-height:15px;font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(123,220,255,.8);">潛意識訊號捕獲中</div>
        <div style="height:15px;line-height:15px;font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(123,220,255,.8);">Oneiric Analysis Engine</div>
        <div style="height:15px;line-height:15px;font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(123,220,255,.8);">Subconscious Observation</div>
      </div>
    </div>
  </div>
</div>
        <!-- 主標題 -->
        <h1 class="main-title">夢境編織室</h1>
        <!-- ============ 新增：標題下方裝飾線（引自 preview .title-deco）============ -->
        <div class="title-deco">
          <div class="dl"></div>
          <div class="dgem"></div>

        </div>
        <!-- 簡短說明文字 -->

          在下方記錄你的夢境與當下的現實情況，然後點選「解密潛意識」。
        <div style="width:calc(100% + 56px);margin:18px -28px 24px;overflow:hidden;padding:10px 0;border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.015);">

        <!-- ============ 新增：夢境欄位標籤（引自 preview .slabel）============ -->
        <!-- 取代原本純文字的 <label>，改為圖示 + 小大寫文字 + 漸層尾線 -->
        <div class="slabel">
          <div class="slabel-icon">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(155,120,255,.9)" stroke-width="2.2">

    <!-- JavaScript：負責進入動畫淡出、Checkbox 切換邏輯、設定面板、音樂控制與語音輸入 -->
    <script>
      // ============ 星點背景層初始化（新增：星空感）============
      // 動態生成 55 個隨機大小與位置的星點，加入隨機閃爍動畫
      (function () {
        const starLayer = document.getElementById('star-layer');
        if (!starLayer) return;
        // 小星 45 顆
for(let i=0;i<45;i++){
  const s=document.createElement('div');
  s.className='st';
  const sz=Math.random()*1.8+0.8;
  const peak=0.35+Math.random()*0.45;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--peak:${peak};animation-duration:${2.5+Math.random()*4}s;animation-delay:${Math.random()*6}s;`;
  starLayer.appendChild(s);
}
// 中星 20 顆
for(let i=0;i<20;i++){
  const s=document.createElement('div');
  s.className='st';
  const sz=Math.random()*1.5+2.2;
  const peak=0.55+Math.random()*0.3;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--peak:${peak};animation-duration:${3+Math.random()*3.5}s;animation-delay:${Math.random()*5}s;box-shadow:0 0 3px 0.5px rgba(200,220,255,0.25);`;
  starLayer.appendChild(s);
}
// 主星 9 顆
const majorPos=[[8,12],[23,45],[67,18],[82,35],[15,72],[55,8],[44,62],[91,15],[38,82]];
majorPos.forEach(([lx,ty])=>{
  const s=document.createElement('div');
  s.className='st major';
  const sz=3.5+Math.random()*1.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${lx}%;top:${ty}%;animation-name:majorTwk;animation-duration:${4+Math.random()*3}s;animation-timing-function:ease-in-out;animation-iteration-count:infinite;animation-delay:${Math.random()*5}s;`;
  starLayer.appendChild(s);
});

    */
      function hideOverlayOnce() {
        // 如果 overlay 已經被隱藏，或已進入散開動畫，就不再重複執行
        if (
          !overlay ||
          overlay.classList.contains("hidden") ||
          overlay.classList.contains("dissolving")

          return;

        // 加入「薄霧散開」動畫類別，讓字體出現擴散、模糊與透明化效果
        overlay.classList.add("dissolving");

        overlay.setAttribute("aria-hidden", "true");

        setTimeout(function () {

      if (overlay) {

// ============ 共用：背景音樂淡入 / 淡出 ============
      function startBgMusic() {
        bgMusic.volume = 0;
        bgMusic.play().catch(function (err) {
          console.warn("背景音訊播放失敗：", err);
        });

        let vol = 0;
        const volumeInterval = setInterval(function () {
          vol += 0.05;
          if (vol >= 0.3) {
            bgMusic.volume = 0.3;
            clearInterval(volumeInterval);
          } else {
            bgMusic.volume = vol;
          }
        }, 100);
      }

      function stopBgMusic() {
        let vol = bgMusic.volume;
        const volumeInterval = setInterval(function () {
          vol -= 0.05;
          if (vol <= 0) {
            bgMusic.volume = 0;
            bgMusic.pause();
            clearInterval(volumeInterval);
          } else {
            bgMusic.volume = vol;
          }
        }, 100);
      }

      toggleMusicCheckbox.addEventListener("change", function () {
        if (toggleMusicCheckbox.checked) {
          startBgMusic();
        } else {
          stopBgMusic();
        }
      });

      ============ 語音輸入控制邏輯 ============

      toggleVoiceCheckbox.addEventListener("change", function () {

          micBtnDream.classList.remove("visible");
          micBtnReality.classList.remove("visible");
          if (recognition && recognition.listening) {
            recognition.abort();
            micBtnDream.classList.remove("listening");
            micBtnReality.classList.remove("listening");
            activeMicBtn = null;

      - 支援繁體中文識別

      - 一次只允許一個麥克風監聽

        recognition.interimResults = false;

        // 呼叫後端 API /api/analyze-dream，使用 JSON POST
        fetch("/api/analyze-dream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ dream: dream, reality: reality, dream_date: dreamDate }),

            const res = data.result || {};
            const placeholderImage = "https://picsum.photos/400/300?blur=2";

            function cleanMarkdownJson(rawText) {
              let cleaned = (rawText || "").trim();
              if (cleaned.startsWith("```json")) {
                cleaned = cleaned.slice(7);
              } else if (cleaned.startsWith("```")) {
                cleaned = cleaned.slice(3);
              }
              if (cleaned.endsWith("```")) {
                cleaned = cleaned.slice(0, -3);
              }
              return cleaned.trim();
            }

            let emotion = "中性";
            let analysis = "";
            let imageUrl = placeholderImage;
            let symbolTags = [];

            if (typeof res === "string") {
              // 若後端直接回傳 raw markdown JSON 字串
              const cleaned = cleanMarkdownJson(res);
              try {
                const parsed = JSON.parse(cleaned);
                emotion = parsed.emotion_tag || emotion;
                symbolTags = Array.isArray(parsed.symbol_tags)
                  ? parsed.symbol_tags
                  : [];
                analysis = parsed.ai_analysis || "";
                imageUrl =
                  parsed.image_url ||
                  parsed.ai_image_url ||
                  parsed.image ||
                  placeholderImage;
              } catch (err) {
                analysis = cleaned;
              }
            } else {
              emotion = res.emotion_tag || emotion;

              // 新增：把 emotion_details 也存起來供遊戲推薦使用
              if (res.emotion_details) {
                  try {
                      if (typeof res.emotion_details === 'string') {
                          res.emotion_details = JSON.parse(res.emotion_details);
                      }
                  } catch(e) {
                      res.emotion_details = null;
                  }
              }

              symbolTags = Array.isArray(res.symbol_tags)
                ? res.symbol_tags
                : [];
              imageUrl =
                res.image_url ||
                res.ai_image_url ||
                res.image ||
                placeholderImage;

              if (typeof res.ai_analysis === "string") {
                const cleanedAnalysis = cleanMarkdownJson(res.ai_analysis);
                try {
                  const parsed = JSON.parse(cleanedAnalysis);
                  analysis = parsed.ai_analysis || "";
                  emotion = parsed.emotion_tag || emotion;
                } catch (err) {
                  analysis = cleanedAnalysis;
                }

              emotion.includes("愉快") ||
              emotion.includes("快樂")

              gradient = "linear-gradient(120deg, #00f5ff, #7c4dff, #00ffe1)";
            } else if (emotion.includes("難過") || emotion.includes("悲傷")) {

            // 情緒關鍵字對應表
            const emotionGameMap = [

                    keywords: ['生氣','暴怒','煩躁','怨氣','不甘心','被背叛','吃醋','憤怒'],

                    category: 'happy',

            // 把情緒詞對應到 category 的輔助函式
            function getCategory(keyword) {
                for (const entry of emotionGameMap) {
                    if (entry.keywords.some(k => keyword.includes(k) || k.includes(keyword))) {
                        return entry.category;
                    }
                }
                return null;
            }

            const emotionDetails = res.emotion_details;
            if (emotionDetails && typeof emotionDetails === 'object') {
                let maxWeight = -1;

                for (const [emo, weight] of Object.entries(emotionDetails)) {
                    if (weight > maxWeight) {

                }
                if (maxEmotion) {
                    finalCategory = getCategory(maxEmotion);
                }

            // 第二優先：emotion_details 比對不到時，用 emotion_tag 關鍵字比對
            if (!finalCategory) {
